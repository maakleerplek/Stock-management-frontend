services:
  frontend:
    build:
      context: .
      args:
        VITE_ORGANIZATION_NAME: ${VITE_ORGANIZATION_NAME}
        VITE_ORGANIZATION_URL: ${VITE_ORGANIZATION_URL}
        VITE_INVENTREE_URL: ${VITE_INVENTREE_URL}
        VITE_INVENTREE_TOKEN: ${VITE_INVENTREE_TOKEN}
        VITE_VOLUNTEER_PASSWORD: ${VITE_VOLUNTEER_PASSWORD}
        VITE_LASER_PRICE_PER_MIN: ${VITE_LASER_PRICE_PER_MIN}
        VITE_PRINT_PRICE_PER_GRAM: ${VITE_PRINT_PRICE_PER_GRAM}
        VITE_CURRENCY: ${VITE_CURRENCY}
        VITE_PAYMENT_NAME: ${VITE_PAYMENT_NAME}
        VITE_PAYMENT_IBAN: ${VITE_PAYMENT_IBAN}
        VITE_PAYCONIQ_MERCHANT_ID: ${VITE_PAYCONIQ_MERCHANT_ID}
        VITE_DOCS_URL: ${VITE_DOCS_URL}
        VITE_FEEDBACK_URL: ${VITE_FEEDBACK_URL}
        VITE_GITHUB_URL: ${VITE_GITHUB_URL}
    container_name: stock-frontend
    environment:
      # Runtime environment variable for Caddy to proxy to InvenTree backend
      - INVENTREE_BACKEND_URL=${INVENTREE_BACKEND_URL}
    ports:
      - "${FRONTEND_HTTP_PORT:-8082}:80"
      - "${FRONTEND_HTTPS_PORT:-8444}:443"
    volumes:
      - ./frontend-caddy-data:/data
      - ./frontend-caddy-config:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
